name: 'nyc_taxi'
version: '1.0.0'
config-version: 2

profile: 'nyc_taxi'

model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]
log-path: "logs"
target-path: "target"

clean-targets:
  - "target"
  - "dbt_packages"

models:
  nyc_taxi:
    staging:
      +materialized: table
      +schema: staging
    mart:
      +materialized: table
      +schema: mart
